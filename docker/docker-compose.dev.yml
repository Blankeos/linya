name: linya

services:
  postgres:
    image: postgres:17-alpine
    container_name: linya-postgres
    restart: unless-stopped
    command: postgres -c wal_level=logical -c max_wal_senders=4 -c max_replication_slots=4
    ports:
      - "5432:5432"
    # URL: "postgresql://postgres:password123@127.0.0.1:5432/ruta_db"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: linya
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  powersync:
    image: journeyapps/powersync-service:latest
    container_name: linya-powersync
    restart: unless-stopped
    command: ["start", "-r", "unified"]
    volumes:
      - ./powersync:/config
    environment:
      - POWERSYNC_CONFIG_PATH=/config/service.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
